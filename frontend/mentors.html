<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mentors - Hackathon Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #6366f1;
      --accent-light: #818cf8;
      --accent-glow: rgba(99,102,241,0.18);
      --accent-soft: rgba(99,102,241,0.08);
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --border: rgba(15,23,42,0.1);
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow-sm: 0 1px 3px rgba(15,23,42,0.06);
      --shadow-md: 0 4px 16px rgba(15,23,42,0.08), 0 2px 6px rgba(15,23,42,0.05);
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0f2f7;
      min-height: 100vh;
      color: var(--text-primary);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 10% -5%, rgba(99,102,241,0.1) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 90% 105%, rgba(139,92,246,0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 60px;
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 9px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    header h1::before {
      content: '';
      display: inline-block;
      width: 26px;
      height: 26px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 7px;
      flex-shrink: 0;
    }

    header nav {
      display: flex;
      align-items: center;
      gap: 2px;
      flex: 1;
      flex-wrap: wrap;
    }

    header nav a {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      padding: 0.38rem 0.75rem;
      border-radius: 6px;
      transition: all var(--transition);
      white-space: nowrap;
    }

    header nav a:hover {
      color: var(--accent);
      background: var(--accent-soft);
    }

    header nav a#logout {
      margin-left: auto;
      color: #ef4444;
      border: 1px solid rgba(239,68,68,0.2);
    }

    header nav a#logout:hover {
      background: #fef2f2;
      color: #dc2626;
    }

    /* ── Page layout ── */
    .container-wide {
      position: relative;
      z-index: 1;
      max-width: 1000px;
      margin: 2.5rem auto;
      padding: 0 1.5rem 4rem;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Page hero ── */
    .page-hero {
      margin-bottom: 2.25rem;
      animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .page-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: #f0fdf4;
      color: #166534;
      border: 1px solid #bbf7d0;
      margin-bottom: 0.65rem;
    }

    /* ── These IDs are set by mentors.js — styled here so they look great ── */
    #mentors-heading {
      font-family: 'Syne', sans-serif;
      font-size: 1.9rem;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.04em;
      line-height: 1.1;
      margin-bottom: 0.4rem;
    }

    #mentors-hint {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 300;
      margin-bottom: 1.75rem;
      line-height: 1.5;
    }

    /* ── Assignments container ── */
    #mentor-assignments {
      animation: fadeUp 0.45s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* Empty / loading state */
    #mentor-assignments:empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 280px;
      background: rgba(255,255,255,0.88);
      border: 1px dashed rgba(15,23,42,0.15);
      border-radius: calc(var(--radius) + 2px);
    }

    #mentor-assignments:empty::before {
      content: '🧭';
      font-size: 2.5rem;
      display: block;
      margin-bottom: 0.75rem;
      opacity: 0.45;
    }

    #mentor-assignments:empty::after {
      content: 'Loading your assigned teams…';
      font-size: 0.875rem;
      color: var(--text-muted);
      font-style: italic;
    }

    /* ── Pre-built styles for JS-injected team cards ── */
    .mentor-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.1rem;
    }

    .mentor-team-card {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 2px);
      box-shadow: var(--shadow-md);
      padding: 1.4rem 1.5rem;
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
    }

    .mentor-team-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #10b981, #6366f1);
      border-radius: 2px 2px 0 0;
    }

    .mentor-team-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(15,23,42,0.1);
      border-color: #a7f3d0;
    }

    .mtc-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 0.85rem;
    }

    .mtc-avatar {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: #f0fdf4;
      border: 1.5px solid #bbf7d0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .mtc-team-name {
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .mtc-team-id {
      font-size: 0.73rem;
      color: var(--text-muted);
      font-weight: 400;
      margin-top: 1px;
    }

    .mtc-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-top: 0.75rem;
    }

    .mtc-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 0.18rem 0.6rem;
      border-radius: 999px;
      font-size: 0.73rem;
      font-weight: 500;
      background: var(--surface-2);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .mtc-pill.green {
      background: #f0fdf4;
      color: #166534;
      border-color: #bbf7d0;
    }

    /* Panel style for list-based layouts */
    .mentor-panel {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 2px);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }

    .mentor-panel-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.95rem 1.5rem;
      border-bottom: 1px solid var(--border);
      gap: 1rem;
      transition: background var(--transition);
    }

    .mentor-panel-row:last-child { border-bottom: none; }
    .mentor-panel-row:hover { background: var(--surface-2); }

    .mpr-name {
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .mpr-sub {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-weight: 300;
      margin-top: 2px;
    }

    .mpr-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 0.22rem 0.65rem;
      border-radius: 999px;
      font-size: 0.73rem;
      font-weight: 600;
      background: #f0fdf4;
      color: #166534;
      border: 1px solid #bbf7d0;
      white-space: nowrap;
    }

    @media (max-width: 640px) {
      header { padding: 0 1rem; height: auto; flex-wrap: wrap; padding: 0.75rem 1rem; gap: 0.75rem; }
      .container-wide { margin: 1.5rem auto; }
      #mentors-heading { font-size: 1.5rem; }
      .mentor-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Mentor dashboard</h1>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="events.html" id="nav-events">Events</a>
      <a href="teams.html" id="nav-teams">Teams</a>
      <a href="projects.html" id="nav-projects">Projects</a>
      <a href="mentors.html" id="nav-mentors">Mentors</a>
      <a href="evaluations.html" id="nav-evaluations">Evaluations</a>
      <a href="admin.html" id="nav-admin">Admin</a>
      <a href="leaderboard.html" id="nav-leaderboard">Leaderboard</a>
      <a href="#" id="logout">Logout</a>
    </nav>
  </header>

  <div class="container container-wide">

    <div class="page-hero">
      <div class="page-chip">🧭 &nbsp;Mentor view</div>
      <h2 id="mentors-heading">Your assigned teams</h2>
      <p class="hint" id="mentors-hint">Assigned by an admin.</p>
    </div>

    <div id="mentor-assignments"></div>

  </div>

  <script src="assets/common.js"></script>
  <script src="assets/mentors.js"></script>
</body>
</html>
